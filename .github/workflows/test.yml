name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download Dependencies
        run: go mod download

      - name: Build
        run: |
          go build -v ./cmd/release-crawler
          go build -v ./cmd/github-releases
          go build -v ./cmd/ai-processor

      - name: Test
        run: go test -v ./...

  hugo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Build Hugo Site
        working-directory: website
        run: hugo --minify

      - name: Verify Hugo Artifacts
        working-directory: website
        run: |
          required_files=(
            "public/feed.xml"
            "public/newsletter/feed.xml"
            "public/robots.txt"
            "public/sitemap.xml"
          )

          for file in "${required_files[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "Missing required Hugo artifact: $file"
              exit 1
            fi
          done

          echo "All required Hugo artifacts are present."

      - name: Check Sitemap for regressions
        working-directory: website
        run: |
          if grep -qE '/true/|/false/' public/sitemap.xml; then
            echo "ERROR: sitemap.xml contains unwanted /true/ or /false/ URLs"
            grep -E '/true/|/false/' public/sitemap.xml
            exit 1
          fi
          echo "Sitemap regression check passed."

