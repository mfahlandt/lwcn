name: Deploy Hugo Site

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  HUGO_VERSION: '0.158.0'
  # TEMPORARY: GitHub deprecated Node 20 on the runners (19 Sep 2025) and now
  # hard-fails actions that still bundle Node 20. The official GitHub Pages
  # actions `actions/upload-pages-artifact@v3` and `actions/deploy-pages@v4`
  # still ship a Node 20 entrypoint and have no Node 24 major release yet, so
  # we opt in to the documented compatibility shim until GitHub bumps them.
  # Remove this once those actions publish a Node 24 version.
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

# Sets permissions of the GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        working-directory: website
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "https://lwcn.dev/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Notify search engines about the updated sitemap after deployment
  ping-search-engines:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Ping Google Sitemap
        run: |
          curl -s "https://www.google.com/ping?sitemap=https://lwcn.dev/sitemap.xml" || true
          echo "Google sitemap ping sent"

      - name: Ping Bing Sitemap
        run: |
          curl -s "https://www.bing.com/ping?sitemap=https://lwcn.dev/sitemap.xml" || true
          echo "Bing sitemap ping sent"

      - name: Ping IndexNow (Bing/Yandex)
        run: |
          curl -s -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "lwcn.dev",
              "key": "a8975d07e68244d585659fe8808e80a0",
              "keyLocation": "https://lwcn.dev/a8975d07e68244d585659fe8808e80a0.txt",
              "urlList": [
                "https://lwcn.dev/",
                "https://lwcn.dev/newsletter/",
                "https://lwcn.dev/sitemap.xml"
              ]
            }' || true
          echo "IndexNow ping sent"

