name: Social Publish

# Publishes a short teaser on Bluesky and X (Twitter) whenever a new
# newsletter issue is added to the Hugo site. Triggers:
#   1. After the "Deploy Hugo Site" workflow completes successfully on main
#      (i.e. the new edition is actually live at https://lwcn.dev/newsletter/...)
#   2. Manual run via workflow_dispatch (for re-posting / testing)
#
# Credentials (GitHub repo secrets — all optional, platform is skipped if unset):
#   BLUESKY_HANDLE          e.g. "lwcn.bsky.social"
#   BLUESKY_APP_PASSWORD    Bluesky app password (NOT your account password)
#
# X (Twitter) — OAuth 1.0a user context (required for POST /2/tweets).
# The X Developer Portal labels are DIFFERENT from our env var names:
#   X_API_KEY         = "API Key"            (Consumer Keys section)
#   X_API_SECRET      = "API Key Secret"     (Consumer Keys section)
#   X_ACCESS_TOKEN    = "Access Token"       (Authentication Tokens section)
#   X_ACCESS_SECRET   = "Access Token Secret"(Authentication Tokens section)
# The app MUST have "Read and Write" permissions. If you change the
# permission level after generating the Access Token, regenerate the
# Access Token — otherwise tweeting returns 401 Unauthorized.
# Do NOT use OAuth 2.0 Client ID/Client Secret or a Bearer Token here —
# those are a different auth flow and will not work with this publisher.

on:
  workflow_run:
    workflows: ["Deploy Hugo Site"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      week:
        description: "ISO week number (leave empty for current week)"
        required: false
      year:
        description: "ISO year (leave empty for current year)"
        required: false
      dry_run:
        description: "Dry run (do not actually post)"
        required: false
        default: "false"

jobs:
  publish:
    # Only run if the upstream deploy succeeded (or this was a manual dispatch)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if newsletter was added
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_post=true" >> "$GITHUB_OUTPUT"
          else
            # Check if any newsletter .md file was added/modified in the triggering commit
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'website/content/newsletter/' | grep -E '^website/content/newsletter/[0-9]{4}-week-[0-9]+\.md$' || true)
            if [ -n "$CHANGED" ]; then
              echo "should_post=true" >> "$GITHUB_OUTPUT"
              echo "Newsletter changed: $CHANGED"
            else
              echo "should_post=false" >> "$GITHUB_OUTPUT"
              echo "No newsletter changes detected, skipping social post."
            fi
          fi

      - name: Set up Go
        if: steps.check.outputs.should_post == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build social-publisher
        if: steps.check.outputs.should_post == 'true'
        run: go build -o bin/social-publisher ./cmd/social-publisher

      - name: Publish teaser
        if: steps.check.outputs.should_post == 'true'
        env:
          BLUESKY_HANDLE:       ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          X_API_KEY:            ${{ secrets.X_API_KEY }}
          X_API_SECRET:         ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:       ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET:      ${{ secrets.X_ACCESS_SECRET }}
        run: |
          ARGS="-content-dir website/content/newsletter"
          if [ -n "${{ github.event.inputs.week }}" ]; then
            ARGS="$ARGS -week ${{ github.event.inputs.week }}"
          fi
          if [ -n "${{ github.event.inputs.year }}" ]; then
            ARGS="$ARGS -year ${{ github.event.inputs.year }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS -dry-run"
          fi
          ./bin/social-publisher $ARGS


