{{- $u := urls.Parse .Destination -}}
{{- $isExternal := and (hasPrefix .Destination "http") (not (hasPrefix .Destination (site.BaseURL))) -}}
<a href="{{ .Destination | safeURL }}"
{{- with .Title }} title="{{ . }}"{{ end -}}
{{- if $isExternal }} target="_blank" rel="noopener"{{ end -}}
>{{ .Text | safeHTML }}</a>
{{- /* Render hook: external links open in new tab with noopener */ -}}
